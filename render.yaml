services:
  # --- API (FastAPI) ---
  # Serves raw sensor intelligence (signals, telemetry) read-only.
  - type: web
    name: idim-api
    runtime: python
    rootDir: observer_bundle
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: IDIM_DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: BINANCE_BASE_URL
        value: https://api.binance.com

  # --- Scanner (background worker) ---
  # Sole signal generator. Writes to the `signals` table only.
  - type: worker
    name: idim-scanner
    runtime: python
    rootDir: observer_bundle
    buildCommand: pip install -r requirements.txt
    startCommand: python scanner.py
    plan: starter
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: BINANCE_BASE_URL
        value: https://api.binance.com
      - key: SCAN_INTERVAL_SECONDS
        value: "60"
      - key: LOOKBACK_15M
        value: "500"
      - key: LOOKBACK_4H
        value: "300"
      - key: LOGIC_VERSION
        value: v1.0-baseline-observer
      - key: CONFIG_VERSION
        value: v1.0-baseline-observer

  # --- Funding rate collector ---
  - type: worker
    name: idim-funding-collector
    runtime: python
    rootDir: observer_bundle
    buildCommand: pip install -r requirements.txt
    startCommand: python funding_collector.py
    plan: starter
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        sync: false

  # --- Open interest collector ---
  - type: worker
    name: idim-oi-collector
    runtime: python
    rootDir: observer_bundle
    buildCommand: pip install -r requirements.txt
    startCommand: python oi_collector.py
    plan: starter
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        sync: false

  # --- Long/short ratio collector ---
  - type: worker
    name: idim-ls-ratio-collector
    runtime: python
    rootDir: observer_bundle
    buildCommand: pip install -r requirements.txt
    startCommand: python ls_ratio_collector.py
    plan: starter
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        sync: false

# NOTE: outcome_tracker.py and auto_executor.py are intentionally NOT defined
# here. Idim is the sensor/collector only — trade resolution and execution
# are owned exclusively by CrypSide (crypside-outcome-tracker,
# crypside-auto-executor). Do not re-add execution services to this repo;
# that was the source of the process-duplication/race-condition bug fixed
# on 2026-06-19.
